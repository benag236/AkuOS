<!DOCTYPE html>
<html>
<head>
  <title>AkuOS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: radial-gradient(circle at top, #1e293b, #020617);
      color: #e5e7eb;
      font-family: Inter, system-ui, -apple-system, sans-serif;
    }
    .center-box {
      max-width: 380px;
      margin: 12vh auto;
      padding: 30px;
      border-radius: 18px;
      background: rgba(15,23,42,0.9);
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      border: 1px solid rgba(148,163,184,0.4);
    }
    input {
      background: rgba(15,23,42,0.9) !important;
      border: 1px solid rgba(148,163,184,0.6) !important;
      color: #e5e7eb !important;
    }
    .btn-success {
      background: linear-gradient(90deg, #10b981, #059669);
      border: none;
      font-weight: 600;
      border-radius: 10px;
    }
    a {
      color: #93c5fd;
      text-decoration: none;
    }
    .toggle-line {
      color: #cbd5e1;
      font-size: 0.92rem;
    }
    .alert {
      border-radius: 12px;
      background: rgba(127, 29, 29, 0.28);
      border-color: rgba(248, 113, 113, 0.22);
      color: #fecaca;
    }
  </style>
</head>
<body>

<div class="center-box">
  <h3 class="mb-3 text-center">AkuOS</h3>
  <p class="text-muted text-center mb-4">Create your account</p>
  {% if register_error %}
    <div class="alert alert-danger mb-3">{{ register_error }}</div>
  {% endif %}
  <form method="POST">
    <input class="form-control mb-3" name="username" placeholder="Username" value="{{ username_value or '' }}" required>
    <input class="form-control mb-2" id="register-password" type="password" name="password" placeholder="Password" required>
    <div class="toggle-line mb-4">
      <label class="mb-0"><input type="checkbox" id="show-register-password"> Show password</label>
    </div>
    <button class="btn btn-success w-100 mb-3">Register</button>
  </form>
  <div class="text-center">
    <a href="{{ url_for('login') }}" target="_self">Back to login</a>
  </div>
</div>

<script>
  const registerPasswordToggle = document.getElementById('show-register-password');
  const registerPasswordInput = document.getElementById('register-password');
  if (registerPasswordToggle && registerPasswordInput) {
    registerPasswordToggle.addEventListener('change', () => {
      registerPasswordInput.type = registerPasswordToggle.checked ? 'text' : 'password';
    });
  }
</script>
</body>
</html>
